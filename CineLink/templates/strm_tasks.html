<div v-if="activeMenu === 'strm_tasks'">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <h2 style="margin:0">⏰ STRM 自动化生成调度</h2>
        <el-button type="primary" @click="openTaskDialog()"><el-icon><AlarmClock></AlarmClock></el-icon>添加定时调度</el-button>
    </div>
    <el-alert title="提示: STRM自动化任务使用 Cron 表达式独立运行，配合防风控休眠确保网盘文件安全映射至本地。" type="info" show-icon style="margin-bottom: 20px;"></el-alert>
    
    <el-table :data="strmTasks" stripe border shadow="never">
        <el-table-column prop="task_name" label="任务名称"></el-table-column>
        <el-table-column label="关联节点"><template #default="s">{{ getStrmConfigName(s.row.config_id) }}</template></el-table-column>
        <el-table-column prop="cron_expression" label="Cron 触发时间" width="200"></el-table-column>
        <el-table-column label="状态" width="100"><template #default="s"><el-switch v-model="s.row.is_enabled" :active-value="1" :inactive-value="0" @change="toggleTaskStatus(s.row)"></el-switch></template></el-table-column>
        <el-table-column label="操作" width="200">
            <template #default="s">
                <el-button type="primary" size="small" plain @click="editStrmTask(s.row)">编辑</el-button>
                <el-button type="danger" size="small" plain @click="deleteStrmTask(s.row.id)">删除</el-button>
            </template>
        </el-table-column>
    </el-table>

    <el-dialog v-model="showTaskDialog" :title="isEditingTask ? '编辑定时生成任务' : '创建定时生成任务'" width="450px">
        <el-form label-position="top">
            <el-form-item label="任务名称"><el-input v-model="newStrmTask.task_name"></el-input></el-form-item>
            <el-form-item label="选择 WebDAV 节点">
                <el-select v-model="newStrmTask.config_id" style="width: 100%;">
                    <el-option v-for="c in strmConfigs" :key="c.id" :label="c.config_name" :value="c.id"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="Cron 表达式 (如 0 */2 * * * 表示每2小时)"><el-input v-model="newStrmTask.cron_expression"></el-input></el-form-item>
            <el-form-item label="任务状态"><el-switch v-model="newStrmTask.is_enabled" :active-value="1" :inactive-value="0" active-text="启用" inactive-text="停用"></el-switch></el-form-item>
        </el-form>
        <template #footer><el-button @click="showTaskDialog = false">取消</el-button><el-button type="primary" @click="saveStrmTask">确认保存</el-button></template>
    </el-dialog>
</div>
